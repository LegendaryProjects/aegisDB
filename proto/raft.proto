syntax = "proto3";

package aegis.network;

service RaftConsensus {
    rpc PreVote (RequestVoteRequest) returns (RequestVoteResponse);
    rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse);
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
}

service ClientAPI {
    rpc CreateTable (TableRequest) returns (ClientResponse);
    rpc InsertRow (RowRequest) returns (ClientResponse);
    rpc DeleteRow (RowRequest) returns (ClientResponse);
    rpc DropTable (TableRequest) returns (ClientResponse);
    rpc SelectTable (TableRequest) returns (SelectResponse);
    rpc ShowTables (ShowRequest) returns (ShowResponse);
}

enum Operation {
    CREATE_TABLE = 0;
    INSERT_ROW = 1;
    DELETE_ROW = 2;
    DROP_TABLE = 3;
}

message LogEntry {
    int32 term = 1;
    Operation op = 2;
    string table_name = 3;
    string payload = 4;   
    string pk_value = 5;  
}

message RequestVoteRequest { int32 term = 1; int32 candidate_id = 2; int32 last_log_index = 3; int32 last_log_term = 4; }
message RequestVoteResponse { int32 term = 1; bool vote_granted = 2; }

message AppendEntriesRequest { int32 term = 1; int32 leader_id = 2; int32 prev_log_index = 3; int32 prev_log_term = 4; repeated LogEntry entries = 5; int32 leader_commit = 6; }
message AppendEntriesResponse { int32 term = 1; bool success = 2; }

// --- API Messages ---
message TableRequest { string table_name = 1; string columns = 2; }
message RowRequest { string table_name = 1; string pk_value = 2; string values = 3; }
message ShowRequest {}

message ClientResponse { bool success = 1; string message = 2; int32 current_leader_id = 3; }
message SelectResponse { bool success = 1; string data = 2; int32 current_leader_id = 3; }
message ShowResponse { bool success = 1; string data = 2; int32 current_leader_id = 3; }